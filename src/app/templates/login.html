{% extends "base.html" %}
{% block title %}Đăng nhập · Sales HQ{% endblock %}
{% block content %}
<section class="login-card">
  <p class="eyebrow">Revenue operating system</p>
  <h1>Đăng nhập Sales HQ</h1>
  <p class="muted">Một góc nhìn rõ ràng cho Director, Manager và Saler.</p>
  <form method="post" action="/login" class="stack">
    <label>Email<input name="email" type="email" required autofocus></label>
    <label>Mật khẩu<input name="password" type="password" required></label>
    <button>Đăng nhập</button>
  </form>
</section>
{% endblock %}

<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#f8fafc"/></marker><style>.t{font-family:'Segoe Print','Comic Sans MS',cursive;fill:#f8fafc}.b{fill:#171717;stroke:#f8fafc;stroke-width:4}.p{fill:#171717;stroke:#c084fc;stroke-width:4}.g{fill:#171717;stroke:#86efac;stroke-width:4}.blue{fill:#171717;stroke:#60a5fa;stroke-width:4}.l{stroke:#f8fafc;stroke-width:4;fill:none;marker-end:url(#a)}</style></defs>
<rect width="1600" height="900" fill="#101113"/><text x="800" y="80" text-anchor="middle" class="t" font-size="52">Recommendation scoring pipeline</text>
<rect class="b" x="55" y="350" width="250" height="130" rx="22"/><text class="t" x="180" y="405" text-anchor="middle" font-size="28">Closed-deal history</text><text class="t" x="180" y="445" text-anchor="middle" font-size="24">+ live pipeline</text>
